services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet-profile-app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-pet_profiles}
      - DB_USER=${DB_USER:-pet_user}
      - DB_PASSWORD=${DB_PASSWORD:-pet_password}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pet-network

  db:
    image: mysql:8.0
    container_name: pet-profile-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-pet_profiles}
      MYSQL_USER: ${DB_USER:-pet_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pet_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pet-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: pet-profile-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pet-network

volumes:
  db_data:

networks:
  pet-network:
    driver: bridge
